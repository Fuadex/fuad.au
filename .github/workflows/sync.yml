name: Build & deploy Rotation

# Two triggers, one pipeline:
#   - daily cron: pull new scrobbles → commit ONLY fuadex.csv → rebuild → deploy
#   - push to main (code/data edits): rebuild → deploy
# Generated files (music-data.js, media-index.js, …) are built HERE and shipped straight to
# Pages as an artifact — they never enter git (repo stays lean; see ROADMAP A2).
# Requires repo Settings → Pages → Source = "GitHub Actions".

on:
  schedule:
    - cron: "17 6 * * *"   # daily ~06:17 UTC
  push:
    branches: [main]
  workflow_dispatch: {}

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: rotation-deploy
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      # 1) append new scrobbles (cheap delta since last build)
      - name: Pull new scrobbles into fuadex.csv
        env:
          LASTFM_API_KEY: ${{ secrets.LASTFM_API_KEY }}
        run: node sync-csv.js

      # 2) regenerate the full dataset (~11 s)
      - name: Rebuild dataset
        run: node build-data.js

      # 3) refresh the live snapshot (now-playing / weekly windows / mood)
      - name: Generate live snapshot
        env:
          LASTFM_API_KEY: ${{ secrets.LASTFM_API_KEY }}
        run: node sync-live.js

      # 4) sanity gate — a broken dataset never deploys
      - name: Smoke test
        run: node smoke.js

      # 5) hand the updated CSV to the persist job — committing it HERE advances the branch
      #    mid-run, which makes the subsequent Pages deployment fail ("deployment_failed":
      #    the run's SHA is no longer HEAD). Persist runs strictly AFTER deploy.
      - uses: actions/upload-artifact@v4
        with:
          name: csv-delta
          path: fuadex.csv
          retention-days: 2

      # 6) stage exactly what the browser needs
      - name: Stage site
        run: |
          mkdir -p _site
          cp index.html favicon.svg og.png CNAME _site/
          cp rotation-live.jsx tweaks-panel.jsx rotation-core.jsx rotation-insights.jsx \
             rotation-views1.jsx rotation-views2.jsx rotation-worldmap.jsx rotation-views3.jsx \
             rotation-explore.jsx rotation-journey.jsx rotation-calendar.jsx rotation-app.jsx _site/
          cp music-data.js live-data.js search-index.js media-index.js track-audio.js \
             track-previews.js artist-flow.js artist-detail.js calendar.js calendar-detail.js \
             geo-detail.js world-map.js _site/
          du -sh _site

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      # Pages intermittently rejects deployments ("Deployment failed, try again later")
      # even with a clean HEAD — one automatic retry absorbs the flake.
      - id: deployment
        uses: actions/deploy-pages@v4
        continue-on-error: true
      - id: retry
        if: steps.deployment.outcome == 'failure'
        uses: actions/deploy-pages@v4

  # commit the CSV delta only after the deployment is settled (see note in build step 5);
  # runs even if deploy failed so scrobbles are never lost.
  persist:
    needs: [build, deploy]
    if: ${{ always() && needs.build.result == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: csv-delta
      - name: Commit CSV if changed
        run: |
          git config user.name "rotation-bot"
          git config user.email "actions@users.noreply.github.com"
          git add fuadex.csv
          if git diff --staged --quiet; then
            echo "no new scrobbles"
          else
            git commit -m "chore: daily last.fm sync"
            git push || (git pull --rebase --autostash && git push)
          fi
