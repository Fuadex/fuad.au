<!-- React runtime is self-hosted (identical UMD bytes to unpkg, SRI-verified) so production
     has no third-party runtime dependency. React 18.3.1 UMD is the final UMD release (React 19
     dropped UMD), so this pin never changes. Babel below is DEV-ONLY: it compiles the .jsx in
     the browser during local authoring; the CI precompile step strips this tag and swaps the
     .jsx for compiled .js in the shipped bundle (see stage-site.js), so it never reaches prod. -->
<script src="react.production.min.js" integrity="sha384-DGyLxAyjq0f9SPpVevD6IgztCFlnMF6oW/XQGmfe+IsZ8TqEiDrcHkMLKI6fiB/Z"></script>
<script src="react-dom.production.min.js" integrity="sha384-gTGxhz21lVGYNMcdJOyq01Edg0jhn/c22nsx0kyqP0TxaV5WVdsSH1fSDUf5YJj1"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<!-- music-core.js = window.ROTATION with everything first paint needs; the deferred rest
     (EXPLORE universe, albums, audio, per-artist clocks) is injected by rotation-app after
     mount via music-rest.js, which merges in and flips ROTATION._restLoaded.
     defer: data no longer blocks the parser/first paint — defer scripts run in document
     order before DOMContentLoaded, so ROTATION is still assembled before the (also
     deferred) app bundles execute. The spotify ♥/engagement overlays are injected
     post-mount by rotation-app (they only decorate artist/track rows). -->
<script src="music-core.js" defer></script>
<script src="live-data.js" defer></script>
<script type="text/babel" src="rotation-live.jsx"></script>
<script type="text/babel" src="tweaks-panel.jsx"></script>
<script type="text/babel" src="rotation-core.jsx"></script>
<script type="text/babel" src="rotation-insights.jsx"></script>
<script type="text/babel" src="rotation-views1.jsx"></script>
<script type="text/babel" src="rotation-views2.jsx"></script>
<script type="text/babel" src="rotation-worldmap.jsx"></script>
<script type="text/babel" src="rotation-views3.jsx"></script>
<script type="text/babel" src="rotation-explore.jsx"></script>

<script type="text/babel" src="rotation-shelves.jsx"></script>
<script type="text/babel" src="rotation-spotify.jsx"></script>

<body>
<div id="root">
  <div id="boot">
    <div class="boot-mark">Rotation<span>.</span></div>
    <div class="boot-sub" id="boot-sub">reading scrobbles…</div>
  </div>
</div>
<script>
  // dynamic count — prefer the daily live total, else the CSV total. Data scripts are defer
  // now, so wait for DOMContentLoaded (defer runs just before it) instead of reading inline.
  document.addEventListener("DOMContentLoaded", function () { try {
    var t = (window.ROTATION_LIVE && window.ROTATION_LIVE.total) || (window.ROTATION && window.ROTATION.TOTALS && window.ROTATION.TOTALS.scrobbles) || 0;
    if (t) document.getElementById("boot-sub").textContent = "reading " + Math.round(t / 1000) + "k scrobbles…";
  } catch (e) {} });
</script>
<style>
  #boot { min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 14px;
    font-family: 'Source Serif 4', Georgia, serif; background: #0b0a0f; }
  .boot-mark { font-style: italic; font-weight: 600; font-size: 44px; letter-spacing: -.02em; color: #f1eef6; }
  .boot-mark span { font-style: normal; color: oklch(0.74 0.13 330); }
  .boot-sub { font-family: 'JetBrains Mono', monospace; font-size: 10px; letter-spacing: .22em; text-transform: uppercase;
    color: #665f78; animation: bootpulse 1.6s ease-in-out infinite; }
  @keyframes bootpulse { 0%,100% { opacity: .4; } 50% { opacity: 1; } }
</style>
<script>
  // PWA shell — https only, so local dev (http) never registers a worker
  if ("serviceWorker" in navigator && location.protocol === "https:")
    addEventListener("load", () => navigator.serviceWorker.register("sw.js").catch(() => {}));
</script>
<script type="text/babel" src="rotation-book.jsx"></script>
<script type="text/babel" src="rotation-lab.jsx"></script>
<script type="text/babel" src="rotation-lab2.jsx"></script>
<script type="text/babel" data-presets="env,react" src="rotation-app.jsx"></script>
</body>
