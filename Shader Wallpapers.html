<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Shader Wallpapers</title>
<meta name="viewport" content="width=device-width,initial-scale=1" />
<style>
  :root{
    --bg:#06070a;
    --fg:#e8eaee;
    --muted:#7c8295;
    --line:rgba(232,234,238,0.12);
    --pill:rgba(12,14,20,0.55);
    --mono: "JetBrains Mono", "IBM Plex Mono", ui-monospace, SFMono-Regular, Menlo, monospace;
    --sans: -apple-system, BlinkMacSystemFont, "Inter", "Helvetica Neue", Arial, sans-serif;
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%;background:var(--bg);color:var(--fg);font-family:var(--sans);overflow:hidden}
  canvas{position:fixed;inset:0;width:100%;height:100%;display:block}

  /* Top-left meta */
  .meta{
    position:fixed;top:22px;left:24px;z-index:5;
    font-family:var(--mono);font-size:11px;letter-spacing:.08em;text-transform:uppercase;
    color:var(--muted);
    pointer-events:none;
    mix-blend-mode:screen;
  }
  .meta .title{color:var(--fg);font-family:var(--sans);font-size:13px;letter-spacing:.02em;text-transform:none;margin-bottom:4px;font-weight:500}
  .meta .desc{max-width:280px;line-height:1.5}

  /* Top-right coords readout */
  .hud{
    position:fixed;top:22px;right:24px;z-index:5;
    font-family:var(--mono);font-size:10.5px;letter-spacing:.06em;
    color:var(--muted);text-align:right;line-height:1.6;
    pointer-events:none;mix-blend-mode:screen;
  }
  .hud b{color:var(--fg);font-weight:500}

  /* Bottom switcher */
  .switcher{
    position:fixed;left:50%;bottom:28px;transform:translateX(-50%);
    z-index:6;
    display:flex;align-items:center;gap:4px;
    padding:6px;border-radius:999px;
    background:var(--pill);
    backdrop-filter:blur(18px) saturate(140%);
    -webkit-backdrop-filter:blur(18px) saturate(140%);
    border:1px solid var(--line);
    box-shadow:0 12px 40px rgba(0,0,0,.45), inset 0 1px 0 rgba(255,255,255,.04);
  }
  .switcher button{
    appearance:none;border:0;background:transparent;color:var(--fg);
    font-family:var(--mono);font-size:11px;letter-spacing:.08em;
    padding:9px 16px;border-radius:999px;cursor:pointer;
    display:flex;align-items:center;gap:8px;
    opacity:.6;transition:opacity .2s, background .2s, color .2s;
  }
  .switcher button:hover{opacity:1}
  .switcher button .num{
    font-size:9px;opacity:.6;
  }
  .switcher button.active{
    background:rgba(232,234,238,0.10);
    opacity:1;
  }
  .switcher button.active .num{opacity:.9}

  /* Hint footer */
  .hint{
    position:fixed;left:50%;bottom:6px;transform:translateX(-50%);
    z-index:5;
    font-family:var(--mono);font-size:9.5px;letter-spacing:.14em;text-transform:uppercase;
    color:var(--muted);opacity:.55;pointer-events:none;
  }

  /* Mobile fallback (no shaders) */
  .err{
    position:fixed;inset:0;display:none;align-items:center;justify-content:center;
    color:var(--muted);font-family:var(--mono);font-size:12px;text-align:center;padding:24px;
  }

  @media (max-width:640px){
    .meta .desc{max-width:200px}
    .switcher button{padding:8px 10px}
    .switcher button .label{display:none}
  }
</style>
</head>
<body>

<canvas id="gl"></canvas>

<div class="meta">
  <div class="title" id="m-title">Flux</div>
  <div class="desc" id="m-desc">Iridescent plasma. Move the cursor to bend the current; click to pulse.</div>
</div>

<div class="hud">
  <div>mouse <b id="h-mouse">0.50, 0.50</b></div>
  <div>fps <b id="h-fps">60</b></div>
</div>

<nav class="switcher" id="switcher" aria-label="Wallpaper">
  <!-- buttons injected -->
</nav>

<div class="hint">move · click · drag</div>

<div class="err" id="err">WebGL is required to view these wallpapers.</div>

<script>
/* ───────────────────────────────────────────────────────────────────────────
   Shader Wallpapers
   ─ five GLSL fragment shaders sharing a quad + a small WebGL runner.
   ─ uniforms:
       uRes      vec2  pixels
       uTime     float seconds since boot
       uMouse    vec2  smoothed pointer in 0..1 (origin top-left)
       uMouseRaw vec2  immediate pointer
       uClick    vec3  (x, y, secondsSinceClick) — last click point
       uDown     float 0/1 held
   ─ each shader is named, has its own palette + description.
   ─────────────────────────────────────────────────────────────────────────── */

const SHADERS = [
  {
    name: "Flux",
    desc: "Iridescent plasma. Move the cursor to bend the current; click to pulse.",
    frag: /*glsl*/`
precision highp float;
uniform vec2 uRes; uniform float uTime; uniform vec2 uMouse; uniform vec3 uClick; uniform float uDown;

// fbm
float h(vec2 p){ return fract(sin(dot(p,vec2(127.1,311.7)))*43758.5453); }
float n(vec2 p){ vec2 i=floor(p),f=fract(p); f=f*f*(3.-2.*f);
  return mix(mix(h(i),h(i+vec2(1,0)),f.x),mix(h(i+vec2(0,1)),h(i+vec2(1,1)),f.x),f.y);
}
float fbm(vec2 p){ float s=0., a=.5; for(int i=0;i<5;i++){ s+=a*n(p); p*=2.02; a*=.5;} return s;}

vec3 pal(float t){
  // cool indigo → magenta → amber
  vec3 a=vec3(.10,.12,.22), b=vec3(.40,.20,.55), c=vec3(1.0,.50,.30), d=vec3(.5,.6,1.0);
  return a + b*cos(6.2831*(c*t+d));
}

void main(){
  vec2 uv = gl_FragCoord.xy/uRes.xy;
  vec2 p = (gl_FragCoord.xy - .5*uRes)/uRes.y;
  vec2 m = uMouse - .5; m.y = -m.y;

  // flow field bent toward mouse
  float t = uTime*.08;
  vec2 q = p + .8*m * smoothstep(.9,0., length(p-m*1.2));
  float f1 = fbm(q*1.6 + vec2(t, -t*.7));
  float f2 = fbm(q*1.6 + 4.2*vec2(f1) + vec2(-t*.6,t));
  float f  = fbm(q*1.4 + 4.0*vec2(f2) + vec2(t*.4,-t*.5));

  // click pulse — concentric ring
  float cd = distance(p, vec2(uClick.x-.5, -(uClick.y-.5))*vec2(uRes.x/uRes.y,1.));
  float ring = exp(-pow((cd - uClick.z*.45),2.)*30.) * exp(-uClick.z*1.2);

  vec3 col = pal(f*1.1 + .15 + length(m)*.3);
  col += ring * vec3(.9,.7,1.0) * 1.4;

  // soft vignette
  col *= 1.0 - .35*pow(length(p)*.9, 2.4);
  // gentle grain
  col += (h(gl_FragCoord.xy + uTime)-.5)*0.012;

  gl_FragColor = vec4(col, 1.);
}`
  },

  {
    name: "Lattice",
    desc: "Voronoi cells. The cursor magnetizes the grid; click ripples outward.",
    frag: /*glsl*/`
precision highp float;
uniform vec2 uRes; uniform float uTime; uniform vec2 uMouse; uniform vec3 uClick; uniform float uDown;

vec2 hash2(vec2 p){ p = vec2(dot(p,vec2(127.1,311.7)),dot(p,vec2(269.5,183.3)));
  return fract(sin(p)*43758.5453); }

void main(){
  vec2 uv = gl_FragCoord.xy/uRes.xy;
  vec2 p = (gl_FragCoord.xy - .5*uRes)/uRes.y;
  vec2 m = (uMouse - .5)*vec2(uRes.x/uRes.y,-1.);

  // click ripple displacement
  float cd = distance(p, vec2(uClick.x-.5,-(uClick.y-.5))*vec2(uRes.x/uRes.y,1.));
  float ripple = sin(cd*30. - uClick.z*9.) * exp(-cd*3.) * exp(-uClick.z*1.5) * .04;
  p += normalize(p - vec2(uClick.x-.5,-(uClick.y-.5))*vec2(uRes.x/uRes.y,1.) + 1e-4) * ripple;

  // attract grid toward mouse
  float pull = smoothstep(.8,0., length(p-m));
  p -= (p - m) * pull * .12;

  float scale = 7.0;
  vec2 g = p*scale;
  vec2 i = floor(g), f = fract(g);

  float d1 = 1e9, d2=1e9;
  vec2 closest;
  for(int y=-1;y<=1;y++)for(int x=-1;x<=1;x++){
    vec2 o = vec2(float(x),float(y));
    vec2 r = hash2(i+o);
    r = .5 + .5*sin(uTime*.4 + 6.2831*r);
    vec2 dpos = o + r - f;
    float d = dot(dpos,dpos);
    if(d<d1){ d2=d1; d1=d; closest = i+o; } else if(d<d2){ d2=d; }
  }
  float edge = sqrt(d2) - sqrt(d1);

  // cell hue
  vec2 ch = hash2(closest);
  float hue = ch.x;
  vec3 base = mix(vec3(.04,.06,.10), vec3(.16,.22,.32), hue);
  base = mix(base, vec3(.55,.75,1.0), .35*pow(smoothstep(.3,0., length((closest+.5)/scale - m)), 1.5));

  // edges
  float e = smoothstep(.02,.0, edge);
  vec3 col = base + e*vec3(.9,.95,1.0)*.6;

  // dot at cell center
  float dot1 = exp(-pow(sqrt(d1)*8.,2.));
  col += dot1 * vec3(.7,.9,1.) * .25;

  // ripple highlight
  col += smoothstep(.0,.02, abs(sin(cd*30. - uClick.z*9.))) * 0.0;
  col += exp(-pow((cd - uClick.z*.45),2.)*40.) * exp(-uClick.z*1.4) * vec3(.6,.8,1.0)*.8;

  col *= 1.0 - .3*pow(length(p)*.9, 2.2);
  gl_FragColor = vec4(col, 1.);
}`
  },

  {
    name: "Nebula",
    desc: "Volumetric nebula. The cursor is a light source; click ignites a flare.",
    frag: /*glsl*/`
precision highp float;
uniform vec2 uRes; uniform float uTime; uniform vec2 uMouse; uniform vec3 uClick; uniform float uDown;

float h(vec2 p){return fract(sin(dot(p,vec2(127.1,311.7)))*43758.5453);}
float n(vec2 p){vec2 i=floor(p),f=fract(p);f=f*f*(3.-2.*f);
 return mix(mix(h(i),h(i+vec2(1,0)),f.x),mix(h(i+vec2(0,1)),h(i+vec2(1,1)),f.x),f.y);}
float fbm(vec2 p){float s=0.,a=.5;for(int i=0;i<6;i++){s+=a*n(p);p=p*2.03+vec2(1.7,9.2);a*=.5;}return s;}

void main(){
  vec2 uv = gl_FragCoord.xy/uRes.xy;
  vec2 p = (gl_FragCoord.xy - .5*uRes)/uRes.y;
  vec2 m = (uMouse - .5)*vec2(uRes.x/uRes.y,-1.);

  float t = uTime*.04;
  // domain warp
  vec2 q = p + vec2(fbm(p*1.5 + t), fbm(p*1.5 - t + 4.));
  float nb = fbm(q*1.8 + t*.5);
  nb = pow(nb, 1.6);

  // light from mouse
  float ld = length(p - m);
  float light = exp(-ld*1.6) + .25/(1.+ld*ld*8.);
  // breathing
  light *= .9 + .1*sin(uTime*1.3);

  // click flare
  vec2 cp = vec2(uClick.x-.5,-(uClick.y-.5))*vec2(uRes.x/uRes.y,1.);
  float fd = length(p-cp);
  float flare = exp(-fd*3.) * exp(-uClick.z*.8);
  float ring  = exp(-pow((fd - uClick.z*.6),2.)*15.) * exp(-uClick.z*1.0);

  // palette: deep blue → magenta → warm core
  vec3 deep = vec3(.02,.03,.08);
  vec3 mid  = vec3(.32,.18,.55);
  vec3 hot  = vec3(1.0,.55,.30);

  vec3 col = mix(deep, mid, nb);
  col = mix(col, hot, smoothstep(.55,1.0, nb*light*1.2));
  col += light * vec3(.55,.45,.85) * .6 * nb;
  col += flare * vec3(1.0,.7,.4) * 1.6;
  col += ring  * vec3(1.0,.85,.6) * 1.2;

  // stars
  vec2 sp = floor(gl_FragCoord.xy*.5);
  float star = step(.9985, h(sp));
  col += star * (.5 + .5*sin(uTime*3.+sp.x)) * vec3(.9,.95,1.);

  col *= 1.0 - .35*pow(length(p)*.85, 2.4);
  gl_FragColor = vec4(col, 1.);
}`
  },

  {
    name: "Caustics",
    desc: "Liquid caustics. The cursor warps the surface; clicks send ripples.",
    frag: /*glsl*/`
precision highp float;
uniform vec2 uRes; uniform float uTime; uniform vec2 uMouse; uniform vec3 uClick; uniform float uDown;

// from iq-style caustics: layered absolute sines
vec2 wave(vec2 p, float t){
  for(int i=0;i<5;i++){
    float fi = float(i);
    p += .5*vec2( sin(p.y*1.3 + t*.7 + fi),
                  cos(p.x*1.1 - t*.6 + fi*1.3) );
    p *= .92;
  }
  return p;
}

void main(){
  vec2 p = (gl_FragCoord.xy - .5*uRes)/uRes.y;
  vec2 m = (uMouse - .5)*vec2(uRes.x/uRes.y,-1.);

  // ripple displacement from click
  vec2 cp = vec2(uClick.x-.5,-(uClick.y-.5))*vec2(uRes.x/uRes.y,1.);
  float cd = length(p-cp);
  float rip = sin(cd*22. - uClick.z*8.) * exp(-cd*2.) * exp(-uClick.z*1.3) * .12;
  vec2 q = p + normalize(p-cp+1e-4)*rip;

  // mouse warp
  float md = length(q-m);
  q += (m-q) * 0.18 * smoothstep(.9,0., md);

  vec2 w = wave(q*2.4, uTime*.5);
  float c = .5 + .5*sin(w.x*4. + w.y*4.);
  c = pow(c, 3.5);

  // teal → cyan → white core
  vec3 deep = vec3(.02,.07,.11);
  vec3 mid  = vec3(.10,.45,.55);
  vec3 hot  = vec3(.85,.98,1.0);
  vec3 col = mix(deep, mid, smoothstep(.0,.6, c));
  col = mix(col, hot, smoothstep(.55,1., c));

  // subtle vertical god-rays
  float ray = pow(.5+.5*sin(p.x*4. + uTime*.3), 8.) * .06;
  col += ray * vec3(.6,.9,1.0);

  // mouse highlight
  col += exp(-md*md*4.) * vec3(.6,.9,1.0)*.25;

  // ripple highlight
  col += exp(-pow((cd - uClick.z*.45),2.)*40.) * exp(-uClick.z*1.3) * vec3(.8,.95,1.0)*.9;

  col *= 1.0 - .35*pow(length(p)*.9, 2.4);
  gl_FragColor = vec4(col, 1.);
}`
  },

  {
    name: "Mesh",
    desc: "Iridescent metaballs. The cursor leads the swarm; click drops a node.",
    frag: /*glsl*/`
precision highp float;
uniform vec2 uRes; uniform float uTime; uniform vec2 uMouse; uniform vec3 uClick; uniform float uDown;

void main(){
  vec2 p = (gl_FragCoord.xy - .5*uRes)/uRes.y;
  vec2 m = (uMouse - .5)*vec2(uRes.x/uRes.y,-1.);
  float t = uTime*.45;

  // five moving sources, one tied to mouse, one to last click
  vec2 b0 = m;
  vec2 b1 = .65*vec2(sin(t*.8),cos(t*.6));
  vec2 b2 = .55*vec2(sin(-t*.7+1.3),cos(t*.5+.4));
  vec2 b3 = .45*vec2(cos(t*.4+2.1),sin(-t*.9+.7));
  vec2 b4 = vec2(uClick.x-.5,-(uClick.y-.5))*vec2(uRes.x/uRes.y,1.);
  float w4 = exp(-uClick.z*.6) * .9;

  float r0 = .35 + .05*sin(uTime*1.5);
  float r1 = .30, r2 = .28, r3 = .26, r4 = .22*w4 + .02;

  float f = 0.;
  f += r0*r0/dot(p-b0,p-b0);
  f += r1*r1/dot(p-b1,p-b1);
  f += r2*r2/dot(p-b2,p-b2);
  f += r3*r3/dot(p-b3,p-b3);
  f += r4*r4/dot(p-b4,p-b4);

  // iridescent palette via angle of resulting field gradient
  vec2 e = vec2(.002,0.);
  float fx =  r0*r0/dot(p+e.xy-b0,p+e.xy-b0)
            + r1*r1/dot(p+e.xy-b1,p+e.xy-b1)
            + r2*r2/dot(p+e.xy-b2,p+e.xy-b2)
            + r3*r3/dot(p+e.xy-b3,p+e.xy-b3)
            + r4*r4/dot(p+e.xy-b4,p+e.xy-b4);
  float fy =  r0*r0/dot(p+e.yx-b0,p+e.yx-b0)
            + r1*r1/dot(p+e.yx-b1,p+e.yx-b1)
            + r2*r2/dot(p+e.yx-b2,p+e.yx-b2)
            + r3*r3/dot(p+e.yx-b3,p+e.yx-b3)
            + r4*r4/dot(p+e.yx-b4,p+e.yx-b4);
  vec2 grad = vec2(fx-f, fy-f);
  float a = atan(grad.y, grad.x);

  // base color from field magnitude, hue from gradient angle
  float k = smoothstep(.7, 1.6, f);
  vec3 irid = .5 + .5*cos(vec3(0., 2.094, 4.188) + a*1.2 + f*1.4);
  vec3 deep = vec3(.04,.05,.10);
  vec3 col = mix(deep, irid, k);

  // crisp surface line
  float surf = smoothstep(.02, .0, abs(f - 1.0));
  col += surf * vec3(1.,1.,1.) * .25;

  // glow
  col += smoothstep(0., 1.6, f) * .05 * vec3(.7,.8,1.);

  col *= 1.0 - .3*pow(length(p)*.9, 2.2);
  gl_FragColor = vec4(col, 1.);
}`
  },
];

/* ── WebGL runner ────────────────────────────────────────────────────────── */
const VS = `
attribute vec2 a; void main(){ gl_Position = vec4(a, 0., 1.); }`;

const canvas = document.getElementById('gl');
const gl = canvas.getContext('webgl', { antialias:false, premultipliedAlpha:false, alpha:false });
if(!gl){ document.getElementById('err').style.display='flex'; throw new Error('no gl'); }

// fullscreen quad
const buf = gl.createBuffer();
gl.bindBuffer(gl.ARRAY_BUFFER, buf);
gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1,-1, 3,-1, -1,3]), gl.STATIC_DRAW);

function compile(src, type){
  const s = gl.createShader(type);
  gl.shaderSource(s, src); gl.compileShader(s);
  if(!gl.getShaderParameter(s, gl.COMPILE_STATUS)){
    console.error(gl.getShaderInfoLog(s), src);
    throw new Error('shader compile');
  }
  return s;
}
function program(frag){
  const p = gl.createProgram();
  gl.attachShader(p, compile(VS, gl.VERTEX_SHADER));
  gl.attachShader(p, compile(frag, gl.FRAGMENT_SHADER));
  gl.linkProgram(p);
  if(!gl.getProgramParameter(p, gl.LINK_STATUS)){ console.error(gl.getProgramInfoLog(p)); throw new Error('link'); }
  const loc = {
    a: gl.getAttribLocation(p, 'a'),
    uRes: gl.getUniformLocation(p, 'uRes'),
    uTime: gl.getUniformLocation(p, 'uTime'),
    uMouse: gl.getUniformLocation(p, 'uMouse'),
    uClick: gl.getUniformLocation(p, 'uClick'),
    uDown: gl.getUniformLocation(p, 'uDown'),
  };
  return { p, loc };
}

const progs = SHADERS.map(s => program(s.frag));
let current = 0;

/* state */
const state = {
  mouseTarget:[.5,.5],
  mouse:[.5,.5],
  click:[.5,.5,99.],   // x,y,age
  down:0,
  t0: performance.now(),
};

/* sizing */
function resize(){
  const dpr = Math.min(window.devicePixelRatio || 1, 2);
  canvas.width  = Math.floor(innerWidth  * dpr);
  canvas.height = Math.floor(innerHeight * dpr);
  gl.viewport(0,0,canvas.width,canvas.height);
}
addEventListener('resize', resize); resize();

/* input */
function setMouse(x,y){
  state.mouseTarget[0] = x / innerWidth;
  state.mouseTarget[1] = y / innerHeight;
}
addEventListener('pointermove', e => setMouse(e.clientX, e.clientY));
addEventListener('pointerdown', e => {
  setMouse(e.clientX, e.clientY);
  state.click[0] = e.clientX / innerWidth;
  state.click[1] = e.clientY / innerHeight;
  state.click[2] = 0;
  state.down = 1;
});
addEventListener('pointerup',   () => state.down = 0);
addEventListener('pointercancel',()=> state.down = 0);

/* switcher UI */
const sw = document.getElementById('switcher');
SHADERS.forEach((s,i)=>{
  const b = document.createElement('button');
  b.innerHTML = `<span class="num">0${i+1}</span><span class="label">${s.name}</span>`;
  b.onclick = ()=> pick(i);
  sw.appendChild(b);
});
function pick(i){
  current = i;
  [...sw.children].forEach((b,j)=> b.classList.toggle('active', j===i));
  document.getElementById('m-title').textContent = SHADERS[i].name;
  document.getElementById('m-desc').textContent = SHADERS[i].desc;
  try{ localStorage.setItem('shader-wallpaper', String(i)); }catch{}
}
const saved = (()=>{ try{ return parseInt(localStorage.getItem('shader-wallpaper')||'0',10); }catch{return 0;} })();
pick(Number.isFinite(saved) && saved>=0 && saved<SHADERS.length ? saved : 0);

/* keyboard */
addEventListener('keydown', e=>{
  if(e.key>='1' && e.key<='5') pick(parseInt(e.key,10)-1);
  if(e.key==='ArrowRight') pick((current+1)%SHADERS.length);
  if(e.key==='ArrowLeft')  pick((current-1+SHADERS.length)%SHADERS.length);
});

/* hud */
const hMouse = document.getElementById('h-mouse');
const hFps   = document.getElementById('h-fps');
let frame=0, fpsAccum=0, fpsT=performance.now();

/* render loop */
let lastT = performance.now();
function tick(now){
  const dt = Math.min(0.05, (now - lastT)/1000);
  lastT = now;
  const t = (now - state.t0)/1000;

  // smooth mouse
  state.mouse[0] += (state.mouseTarget[0]-state.mouse[0]) * Math.min(1, dt*8);
  state.mouse[1] += (state.mouseTarget[1]-state.mouse[1]) * Math.min(1, dt*8);
  // age click
  state.click[2] += dt;

  const { p, loc } = progs[current];
  gl.useProgram(p);
  gl.bindBuffer(gl.ARRAY_BUFFER, buf);
  gl.enableVertexAttribArray(loc.a);
  gl.vertexAttribPointer(loc.a, 2, gl.FLOAT, false, 0, 0);
  gl.uniform2f(loc.uRes, canvas.width, canvas.height);
  gl.uniform1f(loc.uTime, t);
  gl.uniform2f(loc.uMouse, state.mouse[0], state.mouse[1]);
  gl.uniform3f(loc.uClick, state.click[0], state.click[1], state.click[2]);
  gl.uniform1f(loc.uDown, state.down);
  gl.drawArrays(gl.TRIANGLES, 0, 3);

  // hud
  frame++; fpsAccum++;
  if(now - fpsT > 500){
    hFps.textContent = Math.round(fpsAccum*1000/(now-fpsT));
    fpsT = now; fpsAccum = 0;
  }
  if(frame%4===0){
    hMouse.textContent = `${state.mouse[0].toFixed(2)}, ${state.mouse[1].toFixed(2)}`;
  }
  requestAnimationFrame(tick);
}
requestAnimationFrame(tick);
</script>
